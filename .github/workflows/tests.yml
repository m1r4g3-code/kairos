name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Zero dependencies by design — nothing to install. Run the suites directly.
      - name: Engine tests
        working-directory: engine
        run: python test_engine.py

      - name: Ledger tests
        working-directory: engine
        run: python test_ledger.py

      - name: Edge + backtest tests (offline fixtures)
        working-directory: engine
        run: python test_edge.py

      - name: Data-source parser tests (offline fixtures)
        working-directory: engine
        run: python test_sources.py
